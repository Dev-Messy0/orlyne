name: Deploy ORLYNE Bot

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
      
      - name: Clean and Deploy
        run: |
          sshpass -p 'Djabir123' ssh -o StrictHostKeyChecking=no root@84.247.177.39 "
            echo '🚀 Starting deployment...'
            
            # Create app directory
            mkdir -p /var/www/orlyne-md-v2
            cd /var/www/orlyne-md-v2
            
            # Install Node.js 20
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt install -y nodejs ffmpeg nginx
            
            # Install PM2
            npm install -g pm2
            
            # Configure Nginx
            cat > /etc/nginx/sites-available/orlyne-md-v2 << 'EOF'
            server {
                listen 80;
                server_name orlyne-md-v2.duckdns.org;
                
                location / {
                    proxy_pass http://84.247.177.39:5012;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_connect_timeout 3600;
                    proxy_send_timeout 3600;
                    proxy_read_timeout 3600;
                }
            }
            EOF
            
            ln -sf /etc/nginx/sites-available/orlyne-md-v2 /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl restart nginx
            
            # Setup SSL with Let's Encrypt
            apt install -y certbot python3-certbot-nginx
            systemctl stop nginx
            certbot certonly --standalone --non-interactive --agree-tos \
              --email devmessy0@gmail.com -d orlyne-md-v2.duckdns.org || true
            systemctl start nginx
            
            # Create directories
            mkdir -p /var/www/orlyne-md-v2/{accounts,data,temp,public,logs}
          "
      
      - name: Deploy files
        run: |
          sshpass -p 'Djabir123' rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            ./ root@84.247.177.39:/var/www/orlyne-md-v2/
      
      - name: Install dependencies and start
        run: |
          sshpass -p 'Djabir123' ssh -o StrictHostKeyChecking=no root@84.247.177.39 "
            cd /var/www/orlyne-md-v2
            
            # Install dependencies
            npm install --production
            
            # Start bot
            pm2 stop orlyne-md-v2 || true
            pm2 start index.js --name orlyne-md-v2
            pm2 save
            pm2 startup systemd | grep -v 'sudo' | bash || true
            
            # Configure firewall
            ufw allow 22,80,443,3421/tcp
            echo 'y' | ufw enable || true
            
            echo '✅ Deployment completed!'
          "
      
      - name: Verify
        run: |
          sleep 10
          echo "🌐 Site: https://orlyne-md-v2.duckdns.org"