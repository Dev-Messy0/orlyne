name: Deploy ORLYNE Bot

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS
        run: |
          sshpass -p 'Djabir123' ssh -o StrictHostKeyChecking=no root@84.247.177.39 "
            echo '🚀 Starting deployment...'
            
            cd /var/www/orlyne-md-v2
            
            # Create directories if not exist
            mkdir -p /var/www/orlyne-md-v2/{accounts,data,temp,public,logs}
            
            # ==================== INSTALL ONLY ONCE ====================
            # Check if Node.js 20 is installed
            if ! command -v node &> /dev/null || [ \$(node -v | cut -d. -f1 | tr -d 'v') -lt 20 ]; then
              echo '📦 Installing Node.js 20...'
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt install -y nodejs
            fi
            
            # Check if ffmpeg is installed
            if ! command -v ffmpeg &> /dev/null; then
              echo '🎬 Installing ffmpeg...'
              apt install -y ffmpeg
            fi
            
            # Check if PM2 is installed
            if ! command -v pm2 &> /dev/null; then
              echo '⚙️ Installing PM2...'
              npm install -g pm2
            fi
            
            # ==================== NGINX CONFIG (ONLY IF NOT EXISTS) ====================
            if [ ! -f /etc/nginx/sites-available/orlyne-md-v2 ]; then
              echo '🌐 Configuring Nginx...'
              cat > /etc/nginx/sites-available/orlyne-md-v2 << 'NGINX_EOF'
            server {
                listen 80;
                server_name orlyne-md-v2.duckdns.org;
                
                location / {
                    proxy_pass http://84.247.177.39:3421;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_connect_timeout 3600;
                    proxy_send_timeout 3600;
                    proxy_read_timeout 3600;
                }
            }
            NGINX_EOF
              
              ln -sf /etc/nginx/sites-available/orlyne-md-v2 /etc/nginx/sites-enabled/
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx
            fi
            
            # ==================== SSL CERTBOT (ONLY IF NOT EXISTS) ====================
            if [ ! -d /etc/letsencrypt/live/orlyne-md-v2.duckdns.org ]; then
              echo '🔒 Installing SSL certificate...'
              if ! command -v certbot &> /dev/null; then
                apt install -y certbot python3-certbot-nginx
              fi
              certbot --nginx -d orlyne-md-v2.duckdns.org --non-interactive --agree-tos --register-unsafely-without-email || true
            fi
            
            # ==================== FIREWALL (ONLY IF NOT CONFIGURED) ====================
            if ! ufw status | grep -q "80/tcp"; then
              echo '🔥 Configuring firewall...'
              ufw allow 22,80,443,3421/tcp
              echo 'y' | ufw enable || true
            fi
          "

      - name: Deploy files
        run: |
          sshpass -p 'Djabir123' rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'accounts' \
            --exclude 'data' \
            --exclude 'temp' \
            ./ root@84.247.177.39:/var/www/orlyne-md-v2/

      - name: Install dependencies and restart bot
        run: |
          sshpass -p 'Djabir123' ssh -o StrictHostKeyChecking=no root@84.247.177.39 "
            cd /var/www/orlyne-md-v2
            
            # Install/update dependencies
            npm install --production
            
            # Restart bot (NO STOP, just restart)
            pm2 restart orlyne-md-v2 || pm2 start index.js --name orlyne-md-v2
            
            # Save PM2 configuration
            pm2 save
            
            echo '✅ Deployment completed!'
          "

      - name: Verify deployment
        run: |
          sleep 5
          echo "🔍 Verifying..."
          curl -s https://orlyne-md-v2.duckdns.org/health || echo "⚠️ Health check pending"
          echo ""
          echo "✅ Deployment finished!"
          echo "🌐 Site: https://orlyne-md-v2.duckdns.org"