name: Deploy Orlyne MD Bot

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS
        run: |
          sshpass -p 'Djabir123@' ssh -o StrictHostKeyChecking=no root@84.247.177.39 "
            echo '🚀 Starting deployment...'
            
            cd /var/www/orlyne-md-v2
            
            mkdir -p /var/www/orlyne-md-v2/{accounts,data,temp,public,logs}
            
            if ! command -v node &> /dev/null || [ \$(node -v | cut -d. -f1 | tr -d 'v') -lt 20 ]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt install -y nodejs
            fi
            
            if ! command -v ffmpeg &> /dev/null; then
              apt install -y ffmpeg
            fi
            
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
          "

      - name: Deploy files
        run: |
          sshpass -p 'Djabir123@' rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'accounts' \
            --exclude 'data' \
            --exclude 'temp' \
            ./ root@84.247.177.39:/var/www/orlyne-md-v2/

      - name: Install dependencies and start bot
        run: |
          sshpass -p 'Djabir123@' ssh -o StrictHostKeyChecking=no root@84.247.177.39 "
            cd /var/www/orlyne-md-v2
            
            npm install --production
            
            pm2 restart orlyne-md-v2 || pm2 start index.js --name orlyne-md-v2
            pm2 save
            
            echo '✅ Deployment completed!'
          "